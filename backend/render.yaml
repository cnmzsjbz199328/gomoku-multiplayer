services:
  - type: web
    name: gomoku-multiplayer-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: https://gomoku-multiplayer.vercel.app
    healthCheckPath: /health
